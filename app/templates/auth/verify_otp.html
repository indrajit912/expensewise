{% extends "base.html" %}

{% block title %}Verify Account - ExpenseWise{% endblock %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card glass-card border-0 bg-white p-4 shadow-lg rounded-3">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock text-primary display-4 mb-2"></i>
                <h2 class="fw-bold font-outfit text-dark mb-1">Enter Verification Code</h2>
                <p class="text-muted small">We've sent a 6-digit verification code to your email address</p>
            </div>

            <form method="POST" action="{{ url_for('auth.verify_otp') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="mb-4">
                    <label for="otp" class="form-label fw-semibold text-secondary text-uppercase small">One-Time Password (OTP)</label>
                    <input type="text" name="otp" id="otp" class="form-control form-control-lg text-center font-monospace tracking-widest fw-bold border-2" placeholder="000000" maxlength="6" pattern="\d{6}" required autofocus autocomplete="off">
                    <div class="form-text text-center mt-2 text-muted small">
                        Code is valid for 5 minutes.
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 py-2.5 font-outfit mb-3">
                    <i class="bi bi-patch-check-fill me-1"></i> Verify & Activate Account
                </button>
            </form>

            <div class="text-center mt-3 pt-3 border-top border-light">
                <p class="small text-muted mb-1">Didn't receive the email?</p>
                <form method="POST" action="{{ url_for('auth.resend_otp') }}" class="d-inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="btn btn-sm btn-link text-primary text-decoration-none fw-semibold">
                        <i class="bi bi-arrow-clockwise me-1"></i> Resend Verification OTP
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
