{% extends "base.html" %}

{% block title %}Page Not Found - ExpenseWise{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5 my-5">
    <div class="col-md-6 text-center">
        <div class="display-1 text-primary fw-bold font-outfit mb-3">404</div>
        <h2 class="h3 mb-3">Oops! Page Not Found</h2>
        <p class="text-muted mb-4">The URL you requested could not be found. It may have been moved, deleted, or was typed incorrectly.</p>
        <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('dashboard.landing') }}" class="btn btn-primary btn-lg shadow-sm">
            <i class="bi bi-house-door me-2"></i> Take Me Home
        </a>
    </div>
</div>
{% endblock %}
