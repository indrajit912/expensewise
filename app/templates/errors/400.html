{% extends "base.html" %}

{% block title %}Bad Request - ExpenseWise{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5 my-5">
    <div class="col-md-6 text-center">
        <div class="display-1 text-warning fw-bold font-outfit mb-3">400</div>
        <h2 class="h3 mb-3">Bad Request</h2>
        <p class="text-muted mb-4">Your browser sent a request that this server could not understand or process properly.</p>
        <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('dashboard.landing') }}" class="btn btn-primary btn-lg shadow-sm">

        </a>
    </div>
</div>
{% endblock %}
